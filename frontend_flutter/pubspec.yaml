name: naddefli
description: "Naddefli - Cleaning Service Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Auth
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^6.1.0

  # State Management
  provider: ^6.0.0

  # HTTP & Networking
  dio: ^5.3.1
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2

  # UI & Design
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Utilities
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
